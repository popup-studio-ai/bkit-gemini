[command]
name = "batch"
description = "Process multiple features in parallel"
prompt = """
@{extensionPath}/skills/batch/SKILL.md

Command and features: {{args}}

Parse the command (e.g., plan, design, analyze) and feature list.
Execute the command for each feature, tracking progress via Task Tracker.
Report completion status for each feature.

Steps:
1. Parse the PDCA command from the first argument.
2. Parse the feature list from remaining arguments. If no features specified, auto-discover from .pdca-status.json and docs/ directories.
3. Validate prerequisites for each feature (e.g., plan must exist before design).
4. Execute the command for each feature sequentially.
5. Track progress via Task Tracker: create task per feature, update on completion.
6. If a feature fails, log the error and continue to the next feature.
7. After all features are processed, output the Batch Execution Summary table.
8. If --retry-failed flag is present, re-run only previously failed features.
"""
