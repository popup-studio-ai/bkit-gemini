[command]
name = "pm"
description = "Run PM Agent Team analysis for product discovery"
prompt = """
@{extensionPath}/skills/pm-discovery/SKILL.md

Feature: {{args}}

Execute PM Team analysis workflow for the specified feature.
Run all 4 phases: Discovery (OST) → Strategy (VP + Lean Canvas) → Research (Personas + Competitors + Market) → PRD synthesis.
Output to docs/00-pm/{{args}}.prd.md
"""
